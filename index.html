<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Тетрис</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game">
        <!-- Верхняя панель -->
        <div class="top-bar">
            <div class="score">🎯 <span id="score">0</span></div>
            <div class="level">⚡ <span id="level">1</span></div>
            <div class="next">🔮 <canvas id="nextCanvas" width="60" height="60"></canvas></div>
            <button id="resetButton">🔄</button>
        </div>
        
        <!-- Игровое поле -->
        <canvas id="boardCanvas" width="250" height="500"></canvas>
        
        <!-- Кнопки управления -->
        <div class="controls">
            <div class="row">
                <button class="ctrl" id="btnLeft">◀</button>
                <button class="ctrl" id="btnRight">▶</button>
            </div>
            <div class="row">
                <button class="ctrl" id="btnDown">▼</button>
                <button class="ctrl" id="btnRotate">🔄</button>
                <button class="ctrl" id="btnDrop">💥</button>
            </div>
        </div>
        
        <div class="version">v1.0</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
