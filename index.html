<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Тетрис — компактная версия</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game">
        <!-- Игровое поле -->
        <canvas id="boardCanvas" width="300" height="600"></canvas>
        
        <!-- Информация справа -->
        <div class="info">
            <div class="score-box">
                <div class="score-label">ОЧКИ</div>
                <div id="score">0</div>
            </div>
            <div class="level-box">
                <div class="level-label">УРОВЕНЬ</div>
                <div id="level">1</div>
            </div>
            <div class="next-box">
                <div class="next-label">СЛЕД.</div>
                <canvas id="nextCanvas" width="80" height="80"></canvas>
            </div>
            <button id="resetButton">НОВАЯ</button>
            <div class="status" id="gameStatus">ИГРА</div>
        </div>
        
        <!-- Кнопки управления -->
        <div class="controls">
            <div class="row">
                <button class="ctrl" id="btnLeft">◀</button>
                <button class="ctrl" id="btnRight">▶</button>
            </div>
            <div class="row">
                <button class="ctrl" id="btnDown">▼</button>
                <button class="ctrl" id="btnRotate">🔄</button>
                <button class="ctrl" id="btnDrop">💥</button>
            </div>
        </div>
        
        <!-- Версия -->
        <div class="version">v1.0</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
